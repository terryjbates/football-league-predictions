name: Daily Football Simulations

on:
  schedule:
    - cron: '0 1 * * *'  # daily at 01:00 UTC
  workflow_dispatch:

jobs:
  run-simulations:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true  # required to push later

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p data logs backups

      # 5️⃣ Run simulations
      - name: Run precompute_simulations.py
        run: |
          echo "Running simulations at $(date -u +%Y-%m-%d_%H%M%S UTC)"
          python precompute_simulations.py

      # 6️⃣ Commit and push updates if any
      - name: Commit and push updated data
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ logs/ backups/
          git diff-index --quiet HEAD || git commit -m "Update precomputed data [skip ci]"
          git push origin HEAD