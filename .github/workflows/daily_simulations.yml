name: Daily Football Simulations

on:
  schedule:
    - cron: "0 2 * * *"   # Runs every day at 02:00 UTC
  workflow_dispatch:       # Allows manual trigger

jobs:
  run-simulations:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"  # Match your local Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: bash

      - name: Prepare folders
        run: |
          mkdir -p data logs backups
        shell: bash

      - name: Run simulations
        run: |
          echo "Running simulations at $(date -u +%Y-%m-%d_%H%M%S UTC)"
          # Fail fast and print errors
          set -euo pipefail
          python precompute_simulations.py
        shell: bash

      - name: List outputs
        run: |
          echo "Listing data folder contents:"
          ls -l data
          echo "Listing logs folder contents:"
          ls -l logs
        shell: bash